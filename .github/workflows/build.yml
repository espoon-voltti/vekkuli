name: Build
on:
  push:
  schedule:
    - cron: "0 2 * * 1" # At 02:00 on Monday

env:
  AWS_REGION: eu-north-1

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }} # does not cancel master
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: espoon-voltti/voltti-actions/shellcheck@master

  check-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Reuse Compliance Check
        uses: fsfe/reuse-action@v6.0.0

  cache-bust:
    runs-on: ubuntu-latest
    steps:
      - name: "Cache bust"
        id: cache-bust
        run: echo "cache-bust=$(date '+%Y-W%V')" >> "$GITHUB_OUTPUT"
    outputs:
      cache-bust: ${{ steps.cache-bust.outputs.cache-bust }}

  dockerize:
    needs:
      - cache-bust
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: vekkuli/frontend
            path: frontend
          - name: vekkuli/api-gateway
            path: api-gateway

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Setup Docker building
        id: setup
        uses: espoon-voltti/voltti-actions/docker-setup@master
        with:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS: false

      - name: Build image
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: build
        with:
          registry: ghcr.io/espoon-voltti
          name: ${{ matrix.name }}
          path: ${{ matrix.path }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.sha }}

      - name: Build and run unit tests
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: test
        with:
          registry: ghcr.io/espoon-voltti
          name: ${{ matrix.name }}-test
          path: ${{ matrix.path }}
          push: false
          target: test
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.sha }}

  service:
    needs:
      - cache-bust
    runs-on: ubuntu-latest
    env:
      name: vekkuli/service
      path: service
      builder: builder

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Setup Docker building
        id: setup
        uses: espoon-voltti/voltti-actions/docker-setup@master
        with:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS: false

      - name: Build image
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: build
        with:
          registry: ghcr.io/espoon-voltti
          name: ${{ env.name }}
          path: ${{ env.path }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.sha }}

      - name: Build builder
        uses: espoon-voltti/voltti-actions/docker-build-registry@master
        id: builder
        with:
          registry: ghcr.io/espoon-voltti
          name: ${{ env.name }}-${{ env.builder }}
          cache_from: ${{ steps.build.outputs.image_cache }}
          path: ${{ env.path }}
          target: ${{ env.builder }}
          build-args: |
            CACHE_BUST=${{ needs.cache-bust.outputs.cache-bust }}
            build=${{ github.run_number }}
            commit=${{ github.sha }}

    outputs:
      image: ${{ steps.build.outputs.image }}
      image_name: ${{ steps.build.outputs.image_name }}
      builder_image: ${{ steps.builder.outputs.image }}

  owasp:
    if: ${{ github.actor != 'dependabot[bot]' }}
    needs:
      - service
    runs-on: ubuntu-latest
    # Allow Renovate PRs to pass even if OWASP finds new CVEs
    continue-on-error: ${{ github.actor == 'renovate[bot]' }}
    env:
      name: vekkuli/service
      path: service
      builder: builder

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load OWASP cache
        uses: espoon-voltti/voltti-actions/owasp-cache-get@master
        with:
          gh_token: ${{ secrets.VOLTTI_OWASP_TOKEN }}
          t_cache_base: "./"
          t_cache_dir: "dependency-check-data"
          fail_on_miss: "true"

      - name: Run service OWASP tests
        shell: bash
        run: |
          docker run --rm \
              -e CI=true \
              -e NVD_API_KEY=${{ secrets.NVD_API_KEY }} \
              -e OSS_INDEX_USERNAME=${{ secrets.OSS_INDEX_USERNAME }} -e OSS_INDEX_PASSWORD=${{ secrets.OSS_INDEX_PASSWORD }} \
              -v $(pwd)/dependency-check-data:/root/.gradle/dependency-check-data \
              "${{ needs.service.outputs.builder_image }}" \
              sh -c "./gradlew --no-daemon dependencyCheckAnalyze"

  test:
    runs-on: ubuntu-latest
    needs: service
    env:
      BUILD: "false"
      TAG: "${{ github.event.pull_request.head.sha || github.sha }}"

    defaults:
      run:
        working-directory: compose

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        if: ${{ github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
        run: |
          ./test-compose pull

      - name: Build images
        if: ${{ github.actor == 'dependabot[bot]' || github.event.pull_request.head.repo.fork }}
        run: |
          ./test-compose build --parallel

      - name: Run tests
        run: |
          set -o pipefail
          ./test-compose run service-tests | tee tests.log

      - name: Get logs
        if: always()
        run: |
          ./test-compose logs > tests-all.log

      - name: Fix permissions for artifacts
        if: always()
        run: |
          sudo chown -R $USER:$USER tests.log tests-all.log

      - name: Store logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unit-test-results
          path: |
            compose/tests.log
            compose/tests-all.log
          retention-days: 2

  e2e-test:
    runs-on: ubuntu-latest
    needs:
      - service
      - dockerize
    env:
      BUILD: "false"
      TAG: "${{ github.event.pull_request.head.sha || github.sha }}"

    defaults:
      run:
        working-directory: compose

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        if: ${{ github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
        run: |
          ./e2e-test-compose pull

      - name: Build images
        if: ${{ github.actor == 'dependabot[bot]' || github.event.pull_request.head.repo.fork }}
        run: |
          ./e2e-test-compose build --parallel

      - name: Start dependencies
        run: |
          ./e2e-test-compose up -d vekkuli-db redis api-gateway

      - name: Run e2e tests
        run: |
          set -o pipefail
          ./e2e-test-compose up --exit-code-from service-e2e-tests service-e2e-tests | tee tests.log

      - name: Get e2e logs
        if: always()
        run: |
          ./e2e-test-compose logs > tests-all.log

      - name: Fix permissions for artifacts
        if: always()
        run: |
          sudo chown -R $USER:$USER tests.log tests-all.log service-build/

      - name: Store test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-test-results
          path: |
            compose/tests.log
            compose/tests-all.log
            compose/service-build/failure-screenshots/
            compose/service-build/failure-traces/
            compose/service-build/test-results/
          retention-days: 2

  integration-test:
    runs-on: ubuntu-latest
    needs:
      - service
    env:
      BUILD: "false"
      TAG: "${{ github.event.pull_request.head.sha || github.sha }}"

    defaults:
      run:
        working-directory: compose

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        if: ${{ github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
        run: |
          ./integration-test-compose pull

      - name: Build images
        if: ${{ github.actor == 'dependabot[bot]' || github.event.pull_request.head.repo.fork }}
        run: |
          ./integration-test-compose build --parallel

      - name: Run tests
        run: |
          set -o pipefail
          ./integration-test-compose run integration-test | tee integration-test.log

      - name: Get logs
        if: always()
        run: |
          ./integration-test-compose logs > integration-test-all.log

      - name: Fix permissions for artifacts
        if: always()
        run: |
          sudo chown -R $USER:$USER integration-test.log integration-test-all.log

      - name: Store logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: integration-test-results
          path: |
            compose/integration-test.log
            compose/integration-test-all.log
          retention-days: 2

  ecr-push:
    if: ${{ github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
    needs:
      - dockerize
      - service
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-duration-seconds: 1200
          mask-aws-account-id: false

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2.1.6
        with:
          mask-password: 'true'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Copy images from GHCR to ECR
        env:
          SHA: "${{ github.event.pull_request.head.sha || github.sha }}"
          ECR: "${{ steps.ecr.outputs.registry }}"
        run: |
          set -euo pipefail
          for image in service api-gateway frontend; do
            src="ghcr.io/espoon-voltti/vekkuli/${image}:${SHA}"
            dst="${ECR}/vekkuli/${image}:${SHA}"
            echo "Copying ${src} -> ${dst}"
            docker buildx imagetools create --prefer-index=false --tag "${dst}" "${src}"
          done

  deploy:
    runs-on: ubuntu-latest
    needs:
      - ecr-push
    strategy:
      fail-fast: false
      matrix:
        environment:
          - staging
          - prod

    environment:
      name: ${{ matrix.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-duration-seconds: 1200

      - name: Retag
        run: |
          for repository in service api-gateway frontend; do
            if [ "$(aws ecr describe-images --repository-name "vekkuli/$repository" --image-ids imageTag="${{ github.event.pull_request.head.sha || github.sha }}" | jq -r '.imageDetails[].imageTags | index("env-${{ matrix.environment }}")')" = "null" ]; then
              MANIFEST=$(aws ecr batch-get-image --repository-name "vekkuli/$repository" --image-ids imageTag="${{ github.event.pull_request.head.sha || github.sha }}" --output json | jq --raw-output --join-output '.images[0].imageManifest')
              aws ecr put-image --repository-name "vekkuli/$repository" --image-tag "env-${{ matrix.environment }}" --image-manifest "$MANIFEST"
            else
              echo "env-tag on image already exists on $repository"
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ENVIRONMENT }}
          role-duration-seconds: 1200
          unset-current-credentials: true

      - name: Deploy
        run: |
          aws ecs update-service \
            --cluster "vekkuli-${{ matrix.environment }}" \
            --service "vekkuli-${{ matrix.environment }}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "vekkuli-${{ matrix.environment }}" \
            --services "vekkuli-${{ matrix.environment }}"
